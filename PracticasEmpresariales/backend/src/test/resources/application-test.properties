# Base de datos H2 en memoria (se crea y destruye en cada test)
spring.datasource.url=jdbc:h2:mem:gpe_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# SendGrid (correo) — EmailService usa la API HTTP de SendGrid, no SMTP.
# En tests no se realizan llamadas HTTP reales (EmailService.enviar() atrapa
# cualquier excepcion y solo registra el error), pero SystemConfig exige
# que estas propiedades existan para poder construirse.
sendgrid.api-key=test-sendgrid-api-key
app.mail.from.name=Sistema Practicas CUE Test
app.mail.from.address=test@cue.edu.co
app.mail.retry.attempts=1
app.mail.retry.delay-ms=0

# Nombre del sistema / universidad (usados en plantillas de correo)
app.nombre=Sistema de Gestion de Practicas Empresariales
app.universidad=Universidad Alexander Von Humboldt

# JWT — clave de prueba (minimo 32 caracteres)
app.jwt.secret=clave-secreta-para-tests-de-integracion-gpe-2026
app.jwt.expiration-ms=86400000

# Contrase�a del admin DTI inicial
app.init.admin.password=TestAdmin2026!

# Desactivar async para que los tests sean s�ncronos
spring.task.execution.pool.core-size=1

app.init.crear.coordinador.test=true
app.init.coordinador.test.password=CoordTest2026!