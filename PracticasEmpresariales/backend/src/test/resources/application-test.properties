# Base de datos H2 en memoria (se crea y destruye en cada test)
spring.datasource.url=jdbc:h2:mem:gpe_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Desactivar envío de correos reales en tests
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# JWT ? clave de prueba (mínimo 32 caracteres)
app.jwt.secret=clave-secreta-para-tests-de-integracion-gpe-2026
app.jwt.expiration=86400000

# Contraseńa del admin DTI inicial
app.init.admin.password=TestAdmin2026!

# Desactivar async para que los tests sean síncronos
spring.task.execution.pool.core-size=1

app.init.crear.coordinador.test=true
app.init.coordinador.test.password=CoordTest2026!