# ================================================================
# Configuración exclusiva para pruebas automatizadas
# Se activa automáticamente cuando una clase de test lleva
# @ActiveProfiles("test") o cuando Spring Boot lo detecta solo.
# ================================================================

# Base de datos en memoria H2 — se crea al iniciar el test y se destruye al terminar
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate recrea las tablas en cada ejecución de prueba
spring.jpa.hibernate.ddl-auto=create-drop

# JWT — usamos un secreto de prueba con 64+ caracteres (no importa la seguridad aquí)
app.jwt.secret=clave-secreta-para-pruebas-unitarias-e-integrales-cue-2026-testing
app.jwt.expiration-ms=86400000

# Correo — desactivamos el envío real para que los tests no dependan de Gmail
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test@test.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Identificación del sistema (necesario para SystemConfig)
app.nombre=Sistema Test
app.universidad=Universidad Test
app.mail.from.name=Test
app.mail.from.address=test@test.com

# Usuario inicial del DataInitializer (no afecta los tests pero evita errores de @Value)
app.init.admin.correo=dti@test.com
app.init.admin.password=TestPass123!

# CORS (no aplica en tests pero evita errores de @Value en SecurityConfig)
app.cors.allowed-origins=http://localhost:3000
