# ================================================================
# PERFIL MySQL / XAMPP / MariaDB
# ================================================================
# Para usar MySQL necesitas AMBAS cosas:
#
#   1. application.properties → spring.profiles.active=mysql
#   2. Maven → activar perfil "mysql":
#        IntelliJ: panel Maven (derecha) → Profiles → ✓ mysql
#        Terminal: mvn spring-boot:run -P mysql
#
# Pasos con XAMPP:
#   1. Abre XAMPP Control Panel
#   2. Inicia el servicio MySQL (botón Start)
#   3. Abre phpMyAdmin → crea la BD "practicas_cue"
#   4. Si tu MySQL tiene contraseña, ponla en spring.datasource.password
# ================================================================

spring.datasource.url=jdbc:mysql://localhost:3306/practicas_cue?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
