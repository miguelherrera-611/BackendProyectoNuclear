# ================================================================
# PERFIL H2 — Desarrollo rápido sin instalación externa
# ================================================================
# Activa con: spring.profiles.active=h2  (es el default)
# No necesitas perfil Maven extra para H2.
# NOTA: los datos se borran al reiniciar la aplicación.
# ================================================================

spring.datasource.url=jdbc:h2:mem:practicas_cue;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Consola web H2 — accede en: http://localhost:8080/api/h2-console
# JDBC URL para la consola: jdbc:h2:mem:practicas_cue
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false
