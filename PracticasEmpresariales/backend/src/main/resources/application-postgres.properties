# ================================================================
# PERFIL PostgreSQL
# ================================================================
# Para usar PostgreSQL necesitas AMBAS cosas:
#
#   1. application.properties → spring.profiles.active=postgres
#   2. Maven → activar perfil "postgres":
#        IntelliJ: panel Maven (derecha) → Profiles → ✓ postgres
#        Terminal: mvn spring-boot:run -P postgres
#
# Crea la base de datos antes de arrancar:
#   CREATE DATABASE practicas_cue;
# ================================================================

spring.datasource.url=jdbc:postgresql://localhost:5432/practicas_cue
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=TU_PASSWORD_POSTGRES

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
