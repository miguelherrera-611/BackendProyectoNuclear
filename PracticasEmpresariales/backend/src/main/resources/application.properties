# ================================================================
# PRACTICAS EMPRESARIALES CUE — Configuración Principal
# ================================================================

# ----------------------------------------------------------------
# SELECCIÓN DE BASE DE DATOS
# ----------------------------------------------------------------
# Para cambiar de motor tienes que hacer DOS cosas:
#
#   1. Cambia esta línea:
#        h2       → sin instalación, datos en memoria (defecto)
#        postgres → PostgreSQL local
#        mysql    → MySQL / XAMPP
spring.profiles.active=h2
#
#   2. Activa el perfil Maven correspondiente:
#        IntelliJ  → panel "Maven" (derecha) → expande Profiles → marca el perfil
#        Terminal  → mvn spring-boot:run -P postgres
#                 → mvn spring-boot:run -P mysql
#        (H2 no necesita perfil Maven extra, es el default)
#
# ----------------------------------------------------------------

# ----------------------------------------------------------------
# SERVIDOR
# ----------------------------------------------------------------
server.port=8080
server.servlet.context-path=/api

# ----------------------------------------------------------------
# JPA / HIBERNATE — configuración común a todos los motores
# ----------------------------------------------------------------
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
# ddl-auto se define en cada perfil de BD:
#   h2       → create-drop (recrea tablas en cada arranque)
#   postgres → update      (actualiza sin borrar datos)
#   mysql    → update      (actualiza sin borrar datos)

# ----------------------------------------------------------------
# JWT
# ----------------------------------------------------------------
# IMPORTANTE: cambia este secreto en producción (mínimo 64 caracteres)
app.jwt.secret=cue-practicas-empresariales-clave-secreta-alexander-von-humboldt-2026-cambiar-en-produccion
app.jwt.expiration-ms=86400000

# ----------------------------------------------------------------
# CORREO — Gmail con contraseña de aplicación (2FA)
# ----------------------------------------------------------------
# Pasos para obtener la contraseña de aplicación:
#   1. Entra a tu cuenta Google → Seguridad
#   2. Activa "Verificación en dos pasos" si no está activada
#   3. Busca "Contraseñas de aplicación"
#   4. Crea una nueva contraseña para "Correo" → "Otro dispositivo"
#   5. Copia la contraseña de 16 caracteres aquí
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=TU_CORREO@gmail.com
spring.mail.password=TU_CONTRASENA_APP_16_CHARS
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8

# Nombre y dirección visible en los correos enviados
app.mail.from.name=Sistema Practicas CUE
app.mail.from.address=TU_CORREO@gmail.com

# ----------------------------------------------------------------
# CORS — origenes permitidos desde el frontend
# ----------------------------------------------------------------
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ----------------------------------------------------------------
# IDENTIFICACIÓN DEL SISTEMA
# ----------------------------------------------------------------
app.nombre=Sistema de Gestion de Practicas Empresariales
app.universidad=Universidad Alexander Von Humboldt

# ----------------------------------------------------------------
# USUARIO ADMINISTRADOR INICIAL (solo se crea si no existe)
# IMPORTANTE: cambia esta contraseña antes de desplegar en producción
# ----------------------------------------------------------------
app.init.admin.correo=dti@cue.edu.co
app.init.admin.password=Admin2026!
